name: test

on:
  push:
    branches:
      - main
  workflow_dispatch:
  pull_request:

jobs:
  test_x64:
    runs-on: windows-latest
    name: Test x64
    env:
      BAZEL_TOOLCHAINS_MSVC_ACCEPT_MICROSOFT_VISUAL_STUDIO_BUILDTOOLS_EULA: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@7ff4255e941f2652381d81e4e6e2b4965680091d
        with:
          repository-cache: true
          external-cache: true
          bazelrc: |
            common --curses=no

      - name: Run test_default
        working-directory: tests
        run: python integration_test.py test_default

      - name: Run reproducible_test
        working-directory: tests
        run: python integration_test.py reproducible_test --one

      - name: Run all_hosts_all_targets
        working-directory: tests
        run: python integration_test.py all_hosts_all_targets

      - name: Run test_features
        working-directory: tests
        run: python integration_test.py test_features

      - name: Run one_host_one_target
        working-directory: tests
        run: python integration_test.py one_host_one_target

  test_arm64:
    runs-on: windows-11-arm
    name: Test arm64
    env:
      BAZEL_TOOLCHAINS_MSVC_ACCEPT_MICROSOFT_VISUAL_STUDIO_BUILDTOOLS_EULA: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@7ff4255e941f2652381d81e4e6e2b4965680091d
        with:
          repository-cache: true
          external-cache: true
          bazelrc: |
            common --curses=no

      - name: Run test_default
        working-directory: tests
        run: python integration_test.py test_default

      - name: Run reproducible_test
        working-directory: tests
        run: python integration_test.py reproducible_test --one

      - name: Run all_hosts_all_targets
        working-directory: tests
        run: python integration_test.py all_hosts_all_targets

      - name: Run one_host_one_target
        working-directory: tests
        run: python integration_test.py one_host_one_target
